name: Sync data.json to training-hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pq-usecases
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkout training-hub
        uses: actions/checkout@v4
        with:
          repository: dkbholusaria/training-hub
          token: ${{ secrets.TRAINING_HUB_TOKEN }}
          path: training-hub

      - name: Generate data.json
        run: python generate_data.py

      - name: Commit and push data.json to training-hub
        run: |
          cd training-hub
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto-update data.json from pq-usecases [skip ci]"
          git push
